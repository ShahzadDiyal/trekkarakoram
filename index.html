    <meta property="og:image" content="https://images.unsplash.com/photo-1549413248-15a995726715?auto=format&fit=crop&q=80&w=1200" />
    <script>
      // Global fix for "Cannot set property fetch of #<Window> which has only a getter"
      // Many libraries try to polyfill fetch by assignment. In this environment, we must make it writable first.
      (function() {
        try {
          var proxyFetch = window.fetch;
          if (proxyFetch) {
            Object.defineProperty(window, 'fetch', {
              value: proxyFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to patch fetch for writability:', e);
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
