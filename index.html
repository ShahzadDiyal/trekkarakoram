<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pakistan Trekking Adventures</title>
    <script>
      // Global fix for "Cannot set property fetch of #<Window> which has only a getter"
      // Many libraries try to polyfill fetch by assignment. In this environment, we must make it writable first.
      (function() {
        try {
          var proxyFetch = window.fetch;
          if (proxyFetch) {
            Object.defineProperty(window, 'fetch', {
              value: proxyFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Failed to patch fetch for writability:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
